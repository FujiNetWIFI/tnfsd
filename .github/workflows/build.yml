on: [push]

name: tnfsd Build

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-xa65
      - name: Build tnfsd
        run: cd src && make OS=Windows_NT DEBUG=yes USAGELOG=yes
      - uses: actions/upload-artifact@master
        with:
          name: tnfsd_win-x64
          path: bin/tnfsd.exe

  build-ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y xa65
      - name: Build tnfsd
        run: cd /home/runner/work/tnfsd/tnfsd/src && make OS=LINUX DEBUG=yes USAGELOG=yes
      - uses: actions/upload-artifact@master
        with:
          name: tnfsd_linux-x64
          path: bin/tnfsd

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install xa
      - name: Build tnfsd
        run: cd /Users/runner/work/tnfsd/tnfsd/src && make OS=BSD DEBUG=yes USAGELOG=yes
      - uses: actions/upload-artifact@master
        with:
          name: tnfsd_macos-arm64
          path: bin/tnfsd

  build-macos-x64:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install xa
      - name: Build tnfsd
        run: cd /Users/runner/work/tnfsd/tnfsd/src && make OS=BSD DEBUG=yes USAGELOG=yes
      - uses: actions/upload-artifact@master
        with:
          name: tnfsd_macos-x64
          path: bin/tnfsd

